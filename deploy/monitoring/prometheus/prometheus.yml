# ============================================
# Storage Configuration
# ============================================
storage:
  tsdb:
    path: /prometheus
    retention.time: 15d
    retention.size: 10GB
    wal:
      compression: true
      dir: /prometheus/wal

# ============================================
# Web Configuration
# ============================================
web:
  enable_admin_api: false
  enable_lifecycle: true
  page_title: "MARY V5 SHIELD CORE - Prometheus"
  cors:
    origins: ["https://grafana.escudo-digital.com"]
    credentials: same_origin

# ============================================
# Feature Flags
# ============================================
# enable_features:
#   - exemplar-storage
#   - remote-write-receiver
#   - promql-at-modifier
#   - extra-scrape-metrics

# ============================================
# Query Configuration
# ============================================
query:
  max_concurrency: 20
  max_samples: 50000000
  timeout: 2m
  lookback-delta: 5m

# ============================================
# Tracing Configuration
# ============================================
# tracing:
#   type: jaeger
#   endpoint: "http://jaeger:14268/api/traces"

# ============================================
# Runtime Configuration
# ============================================
runtime:
  gogc: 50
  gomaxprocs: 4
  allow-compaction: true
  compaction-compression: true
