# MARY V5 SHIELD CORE v5.0 Enterprise - Production Docker Compose
# Enterprise-grade container orchestration with security hardening

version: '3.8'

services:
  # ============================================
  # Main Application Service
  # ============================================
  mary-v5-shield:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.prod
      target: production
      args:
        BUILD_DATE: ${BUILD_DATE:-2026-05-12T20:00:00Z}
        VCS_REF: ${VCS_REF:-v5.0.0}
        VERSION: ${VERSION:-5.0.0}
    container_name: mary-v5-shield-core
    restart: unless-stopped
    user: "1001:1001"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
      - apparmor:mary-v5-shield
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /app/tmp:noexec,nosuid,size=100m
      - /app/cache:noexec,nosuid,size=200m
      - /app/logs:noexec,nosuid,size=500m
    environment:
      - ENVIRONMENT=production
      - SECURITY_LEVEL=high
      - DEBUG_ENABLED=false
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://maryuser:${DB_PASSWORD}@postgres:5432/maryv5
      - JWT_SECRET=${JWT_SECRET}
      - API_RATE_LIMIT_ENABLED=true
      - CIRCUIT_BREAKER_ENABLED=true
      - THREAT_STREAM_ENABLED=true
      - TELEMETRY_ENGINE_ENABLED=true
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - SSL_CERT_PATH=/app/ssl/cert.pem
      - SSL_KEY_PATH=/app/ssl/key.pem
    env_file:
      - ../../production.env
    volumes:
      - ./../nginx/ssl:/app/ssl:ro
      - ./../backups:/app/backups:ro
      - ./../monitoring/prometheus/rules:/app/prometheus/rules:ro
      - app_logs:/app/logs:rw
      - app_cache:/app/cache:rw
    ports:
      - "8000:8000"
    networks:
      - mary-v5-network
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
        max_failure_ratio: 0.3
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 4096
        hard: 8192

  # ============================================
  # Redis Cache Service
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: mary-v5-redis
    restart: unless-stopped
    user: "999:999"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /var/lib/redis:noexec,nosuid,size=500m
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --requirepass ${REDIS_PASSWORD}
      --tls-port 6380
      --port 6379
      --tls-cert-file /app/ssl/cert.pem
      --tls-key-file /app/ssl/key.pem
      --tls-ca-cert-file /app/ssl/ca.pem
    volumes:
      - redis_data:/var/lib/redis
      - ./../nginx/ssl:/app/ssl:ro
    networks:
      - mary-v5-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    sysctls:
      - net.core.somaxconn=1024

  # ============================================
  # PostgreSQL Database Service
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: mary-v5-postgres
    restart: unless-stopped
    user: "999:999"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    read_only: false
    environment:
      - POSTGRES_DB=maryv5
      - POSTGRES_USER=maryuser
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./../scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
      - ./../backups:/app/backups:ro
    networks:
      - mary-v5-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maryuser -d maryv5"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    sysctls:
      - kernel.shmmax=2147483648
      - kernel.shmall=2097152

  # ============================================
  # Nginx Reverse Proxy
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: mary-v5-nginx
    restart: unless-stopped
    user: "101:101"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - DAC_OVERRIDE
    read_only: true
    tmpfs:
      - /var/cache/nginx:noexec,nosuid,size=100m
      - /var/run:noexec,nosuid,size=50m
      - /tmp:noexec,nosuid,size=50m
    volumes:
      - ./../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./../nginx/conf.d:/etc/nginx/conf.d:ro
      - ./../nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
      - nginx_cache:/var/cache/nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - mary-v5-network
    depends_on:
      mary-v5-shield:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    sysctls:
      - net.core.somaxconn=65535

  # ============================================
  # Prometheus Monitoring
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: mary-v5-prometheus
    restart: unless-stopped
    user: "65534:65534"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.external-url=https://prometheus.escudo-digital.com'
    volumes:
      - ./../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./../monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    networks:
      - mary-v5-network
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ============================================
  # Grafana Visualization
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: mary-v5-grafana
    restart: unless-stopped
    user: "472:472"
    security_opt:
      - no-new-privileges:true
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel,grafana-clock-panel
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_SECURITY_COOKIE_SAMESITE=true
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_SERVER_ROOT_URL=https://grafana.escudo-digital.com
    volumes:
      - grafana_data:/var/lib/grafana
      - ./../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - mary-v5-network
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ============================================
  # AlertManager
  # ============================================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: mary-v5-alertmanager
    restart: unless-stopped
    user: "65534:65534"
    security_opt:
      - no-new-privileges:true
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=https://alertmanager.escudo-digital.com'
    volumes:
      - ./../monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - mary-v5-network
    ports:
      - "9093:9093"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

# ============================================
# Network Configuration
# ============================================
networks:
  mary-v5-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
    driver_opts:
      com.docker.network.bridge.name: mary-v5-bridge
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.driver.mtu: 1500

# ============================================
# Volume Configuration
# ============================================
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/postgresql/data
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/redis/data
  prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/prometheus/data
  grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/grafana/data
  alertmanager_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/alertmanager/data
  app_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/log/mary-v5
  app_cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/cache/mary-v5
  nginx_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/log/nginx
  nginx_cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/cache/nginx

# ============================================
# Logging Configuration
# ============================================
logging:
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    labels: "service,environment"
    compress: "true"
    env: "APP_ENV"
    env-regex: "^(POSTGRES|REDIS|GRAFANA|PROMETHEUS)_"
    tag: "{{.Name}}"

# ============================================
# Resource Limits
# ============================================
x-common-resources: &common-resources
  deploy:
    resources:
      limits:
        cpus: '2.0'
        memory: 1G
      reservations:
        cpus: '0.25'
        memory: 128M
  restart_policy:
    condition: on-failure
    delay: 5s
    max_attempts: 3
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
