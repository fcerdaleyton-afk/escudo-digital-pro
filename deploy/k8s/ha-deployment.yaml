apiVersion: apps/v1
kind: Deployment
metadata:
  name: mary-v5-shield-ha
  namespace: mary-v5-shield
  labels:
    app: mary-v5-shield
    tier: application
    ha-mode: "true"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mary-v5-shield
      ha-mode: "true"
  template:
    metadata:
      labels:
        app: mary-v5-shield
        tier: application
        ha-mode: "true"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                    - mary-v5-shield
              topologyKey: kubernetes.io/hostname
      containers:
      - name: mary-v5-shield
        image: mary-v5-shield:5.0.0
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 8443
          name: https
        env:
        - name: NODE_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: REDIS_URL
          value: "redis://redis-ha:6379"
        - name: POSTGRES_URL
          value: "postgresql://postgres:password@postgres-primary:5432/mary_v5_shield"
        - name: POSTGRES_REPLICA_URL
          value: "postgresql://postgres:password@postgres-replica:5432/mary_v5_shield"
        - name: ENABLE_HA
          value: "true"
        - name: ENABLE_STATELESS_API
          value: "true"
        - name: ENABLE_DISTRIBUTED_LOCKS
          value: "true"
        - name: CLUSTER_SIZE
          value: "3"
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        lifecycle:
          preStop:
            httpGet:
              path: /shutdown
              port: 8000
              scheme: HTTP
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        - name: data
          mountPath: /app/data
        - name: config
          mountPath: /app/config
      volumes:
      - name: logs
        emptyDir: {}
      - name: data
        persistentVolumeClaim:
          claimName: mary-v5-shield-data
      - name: config
        configMap:
          name: mary-v5-shield-config
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        capabilities:
          drop:
          - ALL
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: mary-v5-shield-service
  namespace: mary-v5-shield
  labels:
    app: mary-v5-shield
    tier: application
    ha-mode: "true"
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
    name: http
  - port: 443
    targetPort: 8443
    name: https
  selector:
    app: mary-v5-shield
    ha-mode: "true"
  sessionAffinity: None
  loadBalancerSourceRanges:
  - 0.0.0.0/0

---
apiVersion: v1
kind: Service
metadata:
  name: mary-v5-shield-headless
  namespace: mary-v5-shield
  labels:
    app: mary-v5-shield
    tier: application
    ha-mode: "true"
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  - port: 8443
    targetPort: 8443
    name: https
  selector:
    app: mary-v5-shield
    ha-mode: "true"

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mary-v5-shield-pdb
  namespace: mary-v5-shield
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: mary-v5-shield
      ha-mode: "true"

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mary-v5-shield-hpa
  namespace: mary-v5-shield
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mary-v5-shield-ha
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-ha
  namespace: mary-v5-shield
spec:
  serviceName: redis-ha
  replicas: 1
  selector:
    matchLabels:
      app: redis-ha
  template:
    metadata:
      labels:
        app: redis-ha
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: password
        command:
        - redis-server
        - --requirepass
        - $(REDIS_PASSWORD)
        - --appendonly
        - "yes"
        - --maxmemory
        - "512mb"
        - --maxmemory-policy
        - "allkeys-lru"
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: redis-data
          mountPath: /data
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: redis-ha
  namespace: mary-v5-shield
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: redis-ha

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-primary
  namespace: mary-v5-shield
spec:
  serviceName: postgres-primary
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      role: primary
  template:
    metadata:
      labels:
        app: postgres
        role: primary
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: mary_v5_shield
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
        - name: POSTGRES_REPLICATION_USER
          value: replicator
        - name: POSTGRES_REPLICATION_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: replication_password
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        command:
        - postgres
        - -c
        - config_file=/etc/postgresql/postgresql.conf
        - -c
        - hba_file=/etc/postgresql/pg_hba.conf
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: postgres-config
          mountPath: /etc/postgresql
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-primary-data
      - name: postgres-config
        configMap:
          name: postgres-config
  volumeClaimTemplates:
  - metadata:
      name: postgres-primary-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-primary
  namespace: mary-v5-shield
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgres
    role: primary

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-replica
  namespace: mary-v5-shield
spec:
  serviceName: postgres-replica
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      role: replica
  template:
    metadata:
      labels:
        app: postgres
        role: replica
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: mary_v5_shield
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
        - name: POSTGRES_REPLICATION_USER
          value: replicator
        - name: POSTGRES_REPLICATION_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: replication_password
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        - name: POSTGRES_MASTER_HOST
          value: postgres-primary
        - name: POSTGRES_MASTER_PORT
          value: "5432"
        command:
        - postgres
        - -c
        - config_file=/etc/postgresql/postgresql.conf
        - -c
        - hba_file=/etc/postgresql/pg_hba.conf
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: postgres-config
          mountPath: /etc/postgresql
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-replica-data
      - name: postgres-config
        configMap:
          name: postgres-config
  volumeClaimTemplates:
  - metadata:
      name: postgres-replica-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-replica
  namespace: mary-v5-shield
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgres
    role: replica

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mary-v5-shield-ingress
  namespace: mary-v5-shield
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "mary-v5-shield-session"
    nginx.ingress.kubernetes.io/session-cookie-hash: "sha1"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - api.mary-v5-shield.com
    secretName: mary-v5-shield-tls
  rules:
  - host: api.mary-v5-shield.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mary-v5-shield-service
            port:
              number: 80

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mary-v5-shield-config
  namespace: mary-v5-shield
data:
  app.yaml: |
    name: "MARY V5 SHIELD CORE"
    version: "5.0.0"
    environment: "production"
    debug: "false"
    log_level: "INFO"
  ha.yaml: |
    enabled: true
    cluster_size: 3
    node_timeout: 30
    health_check_interval: 10
    failover_timeout: 60
  redis.yaml: |
    host: "redis-ha"
    port: 6379
    password: "${REDIS_PASSWORD}"
    db: 0
    ssl: false
    max_connections: 100
  postgres.yaml: |
    primary_host: "postgres-primary"
    replica_host: "postgres-replica"
    port: 5432
    database: "mary_v5_shield"
    username: "postgres"
    password: "${POSTGRES_PASSWORD}"
    max_connections: 50
    sslmode: "require"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mary-v5-shield-data
  namespace: mary-v5-shield
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: fast-ssd

---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: mary-v5-shield
type: Opaque
data:
  password: c3VwZXJfc2VjcmV0X3JlZGlzXzIwMjQ=

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: mary-v5-shield
type: Opaque
data:
  password: c3VwZXJfcG9zdGdyZXMxMjAyNA==
  replication_password: cmVwbGljYXRvcl9wYXNzd29yZF8yMDI0

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mary-v5-shield
  namespace: mary-v5-shield

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mary-v5-shield
  namespace: mary-v5-shield
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mary-v5-shield
  namespace: mary-v5-shield
subjects:
- kind: ServiceAccount
  name: mary-v5-shield
  namespace: mary-v5-shield
roleRef:
  kind: Role
  name: mary-v5-shield
  apiGroup: rbac.authorization.k8s.io
