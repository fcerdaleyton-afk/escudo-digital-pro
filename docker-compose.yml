services:
  # 1. EL CEREBRO: MARY V5 API
  mary-api:
    build: .
    container_name: mary_v5_api
    restart: always
    ports:
      - "8080:8000"
    env_file: .env
    volumes:
      - ./private.pem:/app/private.pem:ro
      - ./public.pem:/app/public.pem:ro
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    depends_on:
      - mary-db
      - mary-redis

  # 2. EL CORAZÓN: BASE DE DATOS REAL (PostgreSQL)
  mary-db:
    image: postgres:15-alpine
    container_name: mary_v5_postgres
    restart: always
    environment:
      POSTGRES_USER: mary_admin
      POSTGRES_PASSWORD: password_ultra_secreto_MJ
      POSTGRES_DB: mary_sovereign
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M

  # 3. LA MEMORIA RÁPIDA (Redis)
  mary-redis:
    image: redis:7-alpine
    container_name: mary_v5_redis
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  # 4. EL GUARDIÁN: VIGILANCIA (Puerto 3002 para evitar conflictos)
  guardian:
    image: louislam/uptime-kuma:1
    container_name: mary_v5_guardian
    restart: always
    ports:
      - "3002:3001"
    volumes:
      - uptime-kuma-data:/app/data

# 5. PERSISTENCIA TOTAL
volumes:
  postgres_data:
  uptime-kuma-data:
